name: PHP Quality Checks

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l
